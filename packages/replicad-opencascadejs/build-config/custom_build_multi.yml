  emccFlags:
    - -fwasm-exceptions
    - -sEXPORT_EXCEPTION_HANDLING_HELPERS
    - -sEXPORT_ES6=1
    - -sMODULARIZE
    - -sALLOW_MEMORY_GROWTH=1
    - -sINITIAL_MEMORY=100MB
    - -sMAXIMUM_MEMORY=4GB
    - -sEXPORTED_RUNTIME_METHODS=["FS","HEAP32","HEAPU32","HEAPF32","wasmMemory"]
    - --no-entry
    - --emit-symbol-map
    - -sERROR_ON_UNDEFINED_SYMBOLS=0
    - -Wl,--allow-undefined
    - -sSTACK_SIZE=8388608
    - -sWASM_BIGINT
    - -msimd128
    - -O3
    # Multi-threading (requires COOP/COEP on consumer pages).
    # EVAL_CTORS=2 is omitted — ctor evaluation order is non-deterministic under pthread workers.
    - -pthread
    - -sUSE_PTHREADS=1
    - -sPTHREAD_POOL_SIZE=navigator.hardwareConcurrency
    - -sSHARED_MEMORY=1
    - -sENVIRONMENT=web,worker,node
